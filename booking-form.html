<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Book Funky Monkey Events</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0F0A1E; font-family: 'Nunito', sans-serif; color: #F3E8FF; min-height: 100vh; }
input, select, textarea, button { font-family: 'Nunito', sans-serif; }
input::placeholder, textarea::placeholder { color: #9A7BC0; }
select option { background: #1A1035; color: #F3E8FF; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0F0A1E; }
::-webkit-scrollbar-thumb { background: #3D2460; border-radius: 3px; }
.fl { display: block; font-size: 11px; font-weight: 700; color: #9A7BC0; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.08em; }
.fi { width: 100%; background: #0F0A1E; border: 1.5px solid #2E1F50; border-radius: 10px; padding: 11px 14px; color: #F3E8FF; font-size: 14px; font-family: 'Nunito', sans-serif; transition: border-color .2s; }
.fi:focus { outline: none; border-color: #7C3AED; }
input[type="date"] { color-scheme: dark; cursor: pointer; }
input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6) sepia(1) saturate(4) hue-rotate(220deg); cursor: pointer; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn { padding: 12px 28px; border-radius: 12px; font-weight: 800; font-size: 14px; cursor: pointer; border: none; transition: all .15s; font-family: 'Nunito', sans-serif; }
.bp { background: linear-gradient(135deg,#FF6B00,#FFD600); color: #0F0A1E; }
.bo { background: transparent; color: #F3E8FF; border: 1.5px solid #2E1F50; }
.bg { background: linear-gradient(135deg,#10B981,#06B6D4); color: #fff; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.card { background: #1A1035; border: 1px solid #2E1F50; border-radius: 20px; padding: 28px; margin-bottom: 18px; }
.ac-wrap { position: relative; }
.ac-list { position: absolute; top: 100%; left: 0; right: 0; background: #1A1035; border: 1.5px solid #7C3AED; border-radius: 10px; z-index: 200; max-height: 220px; overflow-y: auto; margin-top: 4px; box-shadow: 0 8px 32px #00000088; }
.ac-item { padding: 10px 14px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #2E1F5044; line-height: 1.4; }
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.hi { background: #2E1F50; color: #FFD600; }
.ac-sub { font-size: 11px; color: #9A7BC0; margin-top: 2px; }
@media(max-width:560px){
  .g2 { grid-template-columns: 1fr; }
  .card { padding: 18px; }
  .btn { padding: 11px 18px; font-size: 13px; }
  .sg { grid-template-columns: 1fr !important; }
}
</style>
</head>
<body>
<div id="app" style="padding:24px 16px;max-width:680px;margin:0 auto"></div>
<script>
const C={yellow:"#FFD600",orange:"#FF6B00",purple:"#7C3AED",green:"#10B981",teal:"#06B6D4",dark:"#0F0A1E",card:"#1A1035",border:"#2E1F50",text:"#F3E8FF",muted:"#9A7BC0"};
const HOME_ZIP="73118",MPM=0.70,OKC_LAT=35.5514,OKC_LON=-97.4075;

const SVCS=[
  {id:"magic_kids",   name:"Children's Magic Show",      cat:"Shows",       price:350,dur:"45 min", icon:"🎩",desc:"Award-winning interactive magic — perfect for birthdays & families!"},
  {id:"magic_corp",   name:"Corporate Magic Show",       cat:"Shows",       price:800,dur:"60 min", icon:"✨",desc:"Elegant close-up and stage magic for corporate events."},
  {id:"balloon",      name:"Balloon Artist",             cat:"Performers",  price:200,dur:"2 hrs",  icon:"🎈",desc:"Colorful balloon animals and creations for all ages."},
  {id:"balloon_wkshp",name:"Balloon Sculpting Workshop", cat:"Shows",       price:275,dur:"45 min", icon:"🎀",desc:"Hands-on balloon sculpting — great for parties or team-building!"},
  {id:"face_paint",   name:"Face Painting",              cat:"Performers",  price:200,dur:"2 hrs",  icon:"🎨",desc:"Superheroes to princesses — stunning face art for all ages."},
  {id:"glitter",      name:"Glitter Tattoos",            cat:"Performers",  price:175,dur:"2 hrs",  icon:"⭐",desc:"Long-lasting shimmery glitter tattoos in dozens of designs."},
  {id:"foam",         name:"Foam Party",                 cat:"Experiences", price:650,dur:"2 hrs",  icon:"🫧",desc:"Epic foam experience that makes your party the talk of town!"},
  {id:"snow",         name:"Snow Experience",            cat:"Experiences", price:550,dur:"2 hrs",  icon:"❄️",desc:"Real snow at your event — no matter the season!"},
  {id:"juggler",      name:"Juggler",                    cat:"Performers",  price:225,dur:"2 hrs",  icon:"🤹",desc:"High-energy juggling with humor and audience interaction."},
  {id:"stilts",       name:"Stilt Walker",               cat:"Performers",  price:275,dur:"2 hrs",  icon:"🦒",desc:"Towering above the crowd with dazzling costumes."},
  {id:"acrobat",      name:"Acrobat",                    cat:"Performers",  price:350,dur:"2 hrs",  icon:"🤸",desc:"Gravity-defying acrobatic performances."},
  {id:"fire",         name:"Fire Breather",              cat:"Performers",  price:400,dur:"30 min", icon:"🔥",desc:"A fiery mesmerizing spectacle of skill and artistry."},
  {id:"dj_pinata",    name:"DJ Piñata",                  cat:"Shows",       price:500,dur:"2 hrs",  icon:"🎵",desc:"Epic glow dance party — exceed fundraising goals!"},
  {id:"gameshow",     name:"Game Show Champions",        cat:"Shows",       price:450,dur:"90 min", icon:"🏆",desc:"Full game show experience with classics + originals."},
  {id:"school_asm",   name:"Magic School Assembly",      cat:"Shows",       price:600,dur:"60 min", icon:"🏫",desc:"Educational magic shows mixing tricks with real lessons."},
  {id:"camp",         name:"Magic Camp",                 cat:"Camps",       price:150,dur:"Per day",icon:"⛺",desc:"Fun-filled magic camps for kids of all ages!"},
];
const AOS=[
  {id:"ao1",name:"Extra Hour of Service",price:85, icon:"⏰"},
  {id:"ao2",name:"Glitter Tattoos Add-On",price:75,icon:"✨"},
  {id:"ao3",name:"Balloon Animals Add-On",price:75,icon:"🎈"},
  {id:"ao4",name:"Photo Booth Add-On",   price:150,icon:"📸"},
  {id:"ao5",name:"Second Performer",     price:175,icon:"👯"},
];

let S={step:1,done:false,saving:false,error:"",mileLoad:false,acResults:[],acHi:-1,
  form:{svcId:"",addons:[],date:"",time:"",evType:"",guests:"",zip:"",loc:"",notes:"",name:"",phone:"",email:"",referral:"",miles:0,fee:0,lat:null,lon:null}};

const re=()=>{
  const a=document.getElementById("app");
  if(S.done){a.innerHTML=renderDone();return;}
  const steps=[s1,s2,s3,s4];
  a.innerHTML=`
  <div style="text-align:center;margin-bottom:28px">
    <div style="font-size:28px;font-weight:900;font-family:'Fredoka One',sans-serif;background:linear-gradient(135deg,${C.orange},${C.yellow});-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px">🐒 Funky Monkey Events</div>
    <div style="font-size:13px;color:${C.muted}">Oklahoma City, OK · (405) 431-6625</div>
  </div>
  ${dots()}${S.step>1?qbar():""}
  <div class="card">
    ${steps[S.step-1]()}
    <div style="display:flex;justify-content:space-between;margin-top:24px;gap:10px">
      ${S.step>1?`<button class="btn bo" onclick="back()">← Back</button>`:"<div></div>"}
      ${S.step<4?`<button class="btn bp" onclick="nxt()" ${ok()?"":"disabled"}>Next Step →</button>`
               :`<button class="btn bg" onclick="sub()" ${S.saving?"disabled":""}>${S.saving?"⏳ Submitting…":"🎉 Submit Booking Request"}</button>`}
    </div>
  </div>
  <div style="text-align:center;font-size:11px;color:${C.muted};line-height:1.7;padding-bottom:24px">
    This is a booking <em>request</em> — not a confirmed reservation.<br>
    Your date is secured once a deposit is received. · <a href="tel:4054316625" style="color:${C.teal}">(405) 431-6625</a>
  </div>`;
};

const set=(u)=>{Object.assign(S,u);re();};
const sf=(u)=>{Object.assign(S.form,u);};  // silent - no re-render
const sfr=(u)=>{Object.assign(S.form,u);re();};

const svc=()=>SVCS.find(s=>s.id===S.form.svcId);
const saos=()=>AOS.filter(a=>S.form.addons.includes(a.id));
const tot=()=>(svc()?.price||0)+saos().reduce((s,a)=>s+a.price,0)+(S.form.fee||0);
const dep=()=>100;
const today=()=>new Date().toISOString().split("T")[0];

// Haversine mileage
const rad=d=>d*Math.PI/180;
const hav=(a,b,c,d)=>{const R=3958.8,dL=rad(c-a),dO=rad(d-b),x=Math.sin(dL/2)**2+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(dO/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));};
const calcM=(lat,lon)=>{const s=hav(OKC_LAT,OKC_LON,lat,lon),m=Math.round(s*1.25*10)/10,f=Math.round(m*2*MPM*100)/100;return{miles:m,fee:f};};

// ZIP lookup — only re-renders when result is ready, never on keystroke
let zt=null;
const zipLook=(z)=>{
  sf({zip:z});
  clearTimeout(zt);
  if(z.length!==5||!/^\d{5}$/.test(z)){sf({miles:0,fee:0,lat:null,lon:null});return;}
  S.mileLoad=true;
  zt=setTimeout(async()=>{
    try{const r=await fetch(`https://api.zippopotam.us/us/${z}`);if(!r.ok)throw 0;const d=await r.json();const lat=+d.places[0].latitude,lon=+d.places[0].longitude;const{miles,fee}=calcM(lat,lon);S.mileLoad=false;sfr({miles,fee,lat,lon});}
    catch{S.mileLoad=false;sfr({miles:0,fee:0,lat:null,lon:null});}
  },600);
};

// Address autocomplete
let at=null;
const renderAcDrop=()=>{
  const el=document.getElementById("ac-drop");
  if(!el)return;
  if(!S.acResults.length){el.innerHTML="";el.style.display="none";return;}
  el.style.display="block";
  el.innerHTML=S.acResults.map((r,i)=>{
    const p=r.display_name.split(", ");
    return`<div class="ac-item${S.acHi===i?" hi":""}" onmousedown="acPick(${i})"><div>${p.slice(0,2).join(", ")}</div><div class="ac-sub">${p.slice(2,5).join(", ")}</div></div>`;
  }).join("");
};
const acLook=(v)=>{
  sf({loc:v});
  clearTimeout(at);
  if(v.length<4){S.acResults=[];S.acHi=-1;renderAcDrop();return;}
  at=setTimeout(async()=>{
    try{const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(v)}&format=json&addressdetails=1&limit=6&countrycodes=us`,{headers:{"Accept-Language":"en"}});const d=await r.json();S.acResults=d;S.acHi=-1;renderAcDrop();}
    catch{S.acResults=[];renderAcDrop();}
  },400);
};
const acPick=(i)=>{
  const r=S.acResults[i];
  const lat=+r.lat,lon=+r.lon;
  const{miles,fee}=calcM(lat,lon);
  const zip=r.address?.postcode?.slice(0,5)||S.form.zip;
  S.acResults=[];S.acHi=-1;
  sfr({loc:r.display_name,lat,lon,miles,fee,zip});
};
const acKey=(e)=>{
  const n=S.acResults.length;if(!n)return;
  if(e.key==="ArrowDown"){e.preventDefault();S.acHi=Math.min(S.acHi+1,n-1);renderAcDrop();}
  else if(e.key==="ArrowUp"){e.preventDefault();S.acHi=Math.max(S.acHi-1,0);renderAcDrop();}
  else if(e.key==="Enter"&&S.acHi>=0){e.preventDefault();acPick(S.acHi);}
  else if(e.key==="Escape"){S.acResults=[];renderAcDrop();}
};

// Validation
const ok=()=>{
  const f=S.form;
  if(S.step===1)return!!f.svcId;
  if(S.step===2)return!!f.date&&!!f.time&&!!f.evType&&!!f.loc&&!!f.zip;
  if(S.step===3)return!!f.name&&!!f.phone&&!!f.email;
  return true;
};

// Sync inputs before navigation (prevents focus-loss issue)
const sync=()=>{
  const m={date:"i-date",guests:"i-guests",zip:"i-zip",loc:"i-loc",notes:"i-notes",name:"i-name",phone:"i-phone",email:"i-email"};
  Object.entries(m).forEach(([k,id])=>{const e=document.getElementById(id);if(e)S.form[k]=e.value;});
};
const nxt=()=>{sync();set({step:S.step+1});};
const back=()=>{sync();set({step:S.step-1});};

// Submit
const sub=async()=>{
  set({saving:true,error:""});
  try{
    const s=svc(),t=tot();
    const r=await fetch("/api/bookings",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      client:S.form.name,phone:S.form.phone,email:S.form.email,eventType:S.form.evType,
      guests:parseInt(S.form.guests)||0,referral:S.form.referral,serviceId:S.form.svcId,
      service:s?.name||"",date:S.form.date,time:S.form.time,zip:S.form.zip,
      location:S.form.loc,notes:S.form.notes,addons:S.form.addons,
      mileageFee:S.form.fee||0,miles:S.form.miles||0,total:t,depositDue:dep(),
    })});
    if(!r.ok)throw new Error(await r.text());
    set({done:true,saving:false});
  }catch(e){set({saving:false,error:"Something went wrong. Please call (405) 431-6625 or try again."});}
};

// ── Step renderers ─────────────────────────────
const dots=()=>{
  const LB=["Service","Event Details","Your Info","Quote & Submit"];
  return`<div style="display:flex;margin-bottom:28px">${LB.map((l,i)=>{
    const a=S.step===i+1,d=S.step>i+1,bg=d?C.green:a?`linear-gradient(135deg,${C.orange},${C.yellow})`:C.border,col=a?C.dark:d?"#fff":C.muted;
    const lL=i>0?`<div style="flex:1;height:2px;background:${S.step>i?C.orange:C.border}"></div>`:"";
    const lR=i<LB.length-1?`<div style="flex:1;height:2px;background:${S.step>i+1?C.orange:C.border}"></div>`:"";
    return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px">
      <div style="display:flex;align-items:center;width:100%">${lL}<div style="width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:${bg};color:${col};font-weight:900;font-size:12px">${d?"✓":i+1}</div>${lR}</div>
      <div style="font-size:9px;color:${a?C.orange:C.muted};font-weight:700;text-transform:uppercase;text-align:center">${l}</div>
    </div>`;
  }).join("")}</div>`;
};

const qbar=()=>{
  const s=svc();if(!s)return"";
  const at=saos().reduce((x,a)=>x+a.price,0),f=S.form.fee||0,t=tot();
  return`<div style="background:linear-gradient(135deg,#1A1035,#0A2010);border:1px solid ${C.green}44;border-radius:14px;padding:12px 20px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      <div><div style="font-size:10px;color:${C.muted};font-weight:700;text-transform:uppercase">Service</div><div style="font-size:12px;color:${C.text};font-weight:700">${s.icon} ${s.name}</div></div>
      ${f>0?`<div><div style="font-size:10px;color:${C.muted};font-weight:700;text-transform:uppercase">Travel</div><div style="font-size:12px;color:${C.teal};font-weight:700">+$${f.toFixed(2)}</div></div>`:""}
      ${at>0?`<div><div style="font-size:10px;color:${C.muted};font-weight:700;text-transform:uppercase">Add-ons</div><div style="font-size:12px;color:${C.purple};font-weight:700">+$${at}</div></div>`:""}
    </div>
    <div style="text-align:right"><div style="font-size:10px;color:${C.muted};font-weight:700;text-transform:uppercase">Est. Total</div><div style="font-size:22px;font-weight:900;color:${C.green}">$${t.toFixed(2)}</div></div>
  </div>`;
};

const s1=()=>{
  const cats=[...new Set(SVCS.map(s=>s.cat))];
  const sh=cats.map(cat=>{
    const cards=SVCS.filter(s=>s.cat===cat).map(s=>{const sel=S.form.svcId===s.id;return`<div onclick="sfr({svcId:'${s.id}'})" style="padding:14px 16px;border-radius:14px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;border:2px solid ${sel?C.orange:C.border};background:${sel?"#200E0044":C.dark};transition:all .2s">
      <div style="font-size:26px;line-height:1;flex-shrink:0">${s.icon}</div>
      <div style="flex:1"><div style="font-weight:800;color:${sel?C.yellow:C.text};font-size:13px;margin-bottom:2px">${s.name}</div><div style="font-size:11px;color:${C.muted};line-height:1.4;margin-bottom:6px">${s.desc}</div>
        <div style="display:flex;gap:10px"><span style="font-size:15px;font-weight:900;color:${C.green}">from $${s.price}</span><span style="font-size:11px;color:${C.muted}">· ${s.dur}</span></div></div>
      ${sel?`<span style="color:${C.orange};font-size:16px;flex-shrink:0">✓</span>`:""}
    </div>`;}).join("");
    return`<div style="margin-bottom:22px"><div style="font-size:11px;font-weight:800;color:${C.orange};text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px">${cat}</div><div class="sg" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px">${cards}</div></div>`;
  }).join("");
  const ah=!S.form.svcId?"":`<div style="font-size:14px;font-weight:800;color:${C.text};margin-bottom:10px">✨ Add-Ons (optional)</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">
      ${AOS.map(a=>{const sel=S.form.addons.includes(a.id);return`<div onclick="togAo('${a.id}')" style="padding:11px 14px;border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:10px;border:2px solid ${sel?C.purple:C.border};background:${sel?"#1A0040":C.dark};transition:all .15s">
        <span style="font-size:20px">${a.icon}</span><div style="flex:1"><div style="font-size:12px;font-weight:700;color:${C.text}">${a.name}</div><div style="font-size:12px;color:${C.green};font-weight:700">+$${a.price}</div></div>
        <div style="width:18px;height:18px;border-radius:50%;border:2px solid ${sel?C.purple:C.border};background:${sel?C.purple:"transparent"};display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff">${sel?"✓":""}</div>
      </div>`;}).join("")}
    </div>`;
  return`<div><div style="font-weight:900;font-size:18px;color:${C.text};margin-bottom:4px">What can we do for your event? 🎪</div>
    <div style="color:${C.muted};font-size:13px;margin-bottom:20px">Select a service, then choose any add-ons.</div>${sh}${ah}</div>`;
};

const s2=()=>{
  const f=S.form;

  const mb=(f.zip.length===5||f.lat)?`<div style="background:linear-gradient(135deg,#0A1A2E,#0A2A1E);border:1.5px solid ${C.teal}44;border-radius:14px;padding:14px 18px;margin-bottom:14px">
    <div style="font-size:11px;font-weight:800;color:${C.teal};text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px">🚗 Travel Fee Estimate</div>
    ${S.mileLoad?`<div style="color:${C.muted};font-size:13px">Looking up location…</div>`:f.miles>0?`<div style="display:flex;gap:24px;flex-wrap:wrap;align-items:center">
      <div style="text-align:center"><div style="font-size:22px;font-weight:900;color:${C.teal}">${f.miles} mi</div><div style="font-size:10px;color:${C.muted};text-transform:uppercase">Est. One Way</div></div>
      <div style="text-align:center"><div style="font-size:22px;font-weight:900;color:${C.teal}">${(f.miles*2).toFixed(1)} mi</div><div style="font-size:10px;color:${C.muted};text-transform:uppercase">Round Trip</div></div>
      <div style="text-align:center"><div style="font-size:26px;font-weight:900;color:${C.green}">$${f.fee.toFixed(2)}</div><div style="font-size:10px;color:${C.muted};text-transform:uppercase">Travel Fee</div></div>
      <div style="font-size:11px;color:${C.muted};line-height:1.6">From OKC (${HOME_ZIP})<br>$${MPM}/mi × ${(f.miles*2).toFixed(1)} mi<br><em>Driving est · confirmed at booking</em></div>
    </div>`:`<div style="color:${C.muted};font-size:13px">ZIP not found — fee confirmed at booking.</div>`}
  </div>`:"";
  return`<div>
    <div style="font-weight:900;font-size:18px;color:${C.text};margin-bottom:4px">Tell us about your event 📅</div>
    <div style="color:${C.muted};font-size:13px;margin-bottom:20px">We'll check availability and calculate your travel fee.</div>
    <div class="g2">
      <div style="margin-bottom:14px"><label class="fl">Event Date <span style="color:#FF6B00">*</span></label>
        <input type="date" id="i-date" class="fi" value="${f.date}" min="${today()}" onchange="sfr({date:this.value})"/></div>
      <div style="margin-bottom:14px"><label class="fl">Start Time <span style="color:#FF6B00">*</span></label>
